<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Intan Miracle</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <style>
        .admin-container {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            text-align: center;
            border-bottom: 4px solid var(--pink-400);
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card p {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--pink-600);
        }

        .table-wrapper {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        th {
            background: var(--pink-50);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: var(--pink-700);
            border-bottom: 2px solid var(--pink-100);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--pink-50);
            font-size: 0.9rem;
            vertical-align: middle;
        }

        tr:hover {
            background: #fff9fa;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-confirmed {
            background: #d1fae5;
            color: #065f46;
        }

        .status-completed {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .admin-actions {
            display: flex;
            gap: 5px;
        }
    </style>
</head>

<body>
    <!-- Login Required Overlay -->
    <div id="loginOverlay">
        <div style="max-width: 400px; padding: 30px;">
            <h2 style="margin-bottom: 15px;">Akses Terbatas</h2>
            <p style="margin-bottom: 25px; color: var(--text-secondary);">Silakan masuk dengan akun Admin untuk melihat
                dashboard ini.</p>
            <a href="member.html" class="btn btn-primary">Ke Halaman Login</a>
        </div>
    </div>

    <div class="admin-container">
        <div class="admin-header">
            <div>
                <h1 class="text-gradient">Admin Dashboard</h1>
                <p>Kelola semua reservasi Intan Miracle</p>
            </div>
            <div class="admin-actions">
                <button id="refreshBtn" class="btn btn-secondary btn-small">🔄 Refresh</button>
                <button id="logoutBtn" class="btn btn-secondary btn-small">Keluar</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Reservasi</h3>
                <p id="totalCount">0</p>
            </div>
            <div class="stat-card">
                <h3>Pending</h3>
                <p id="pendingCount">0</p>
            </div>
            <div class="stat-card">
                <h3>Bulan Ini</h3>
                <p id="monthCount">0</p>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Tanggal/Waktu</th>
                        <th>Nama Ibu</th>
                        <th>WA / Alamat</th>
                        <th>Layanan</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="reservationsBody">
                    <!-- Rows will be injected by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
